<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing</title>

  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    /* NAVIGATION */
    .nav {
      display: flex;
      gap: 20px;
      margin-top: 90px; /* pushes nav below COMING SOON banner */
      margin-bottom: 40px;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      padding: 10px 18px;
      background: #262626;
      border-radius: 6px;
      transition: 0.2s;
    }

    .nav a:hover {
      background: #ff4747;
    }

    /* Active page marker for Pricing.html */
    .nav a.active {
      background: #ff4747;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
    }

    .pricing-container {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
      align-items: stretch;
    }

    .price-box {
      background: #1a1a1a;
      padding: 25px;
      width: 260px;
      border-radius: 10px;
      border: 1px solid #333;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Highlights the custom option with your signature red color */
    .price-box.featured {
      border: 2px solid #ff4747;
      box-shadow: 0 0 15px rgba(255, 71, 71, 0.2);
    }

    .price-box h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .price-box p {
      margin-bottom: 15px;
      color: #ccc;
      font-size: 14px;
    }

    .price {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #ff4747; 
    }

    .price span {
      font-size: 14px;
      font-weight: normal;
      color: #aaa;
    }

    /* Clean bulleted lists for terms and features */
    .features-list {
      text-align: left;
      padding-left: 15px;
      font-size: 14px;
      color: #ddd;
      line-height: 1.6;
      margin: 0;
    }

    .features-list li {
      margin-bottom: 8px;
    }

    /* BIG RED COMING SOON BANNER */
    .coming-soon-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 25px 0;
      background: #ff4747;
      color: #fff;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- COMING SOON BANNER -->
  <div class="coming-soon-banner">COMING SOON</div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="index.html">Request Beat</a>
    <a href="pricing.html">Pricing</a>
    <a href="AboutMe.html">How It Works?</a>
  </div>

  <h1>Beat Pricing</h1>

</body>
</html>
