<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Beat</title>

  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    /* NAVIGATION */
    .nav {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      padding: 10px 18px;
      background: #262626;
      border-radius: 6px;
      transition: 0.2s;
    }

    .nav a:hover {
      background: #ff4747;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
    }

    form {
      max-width: 600px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid #333;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
      background: #262626;
      color: #fff;
      font-size: 15px;
    }

    textarea {
      height: 140px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #ff4747;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ff2e2e;
    }

    /* POPUP */
    .modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-box {
      background: #1a1a1a;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #333;
    }

    .modal-box button {
      margin-top: 20px;
      width: 100%;
      background: #ff4747;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="index.html">Request Beat</a>
    <a href="pricing.html">Pricing</a>
    <a href="AboutMe.html">How It Works?</a>
  </div>

  <h1>Request a Custom Beat</h1>

  <form action="https://formspree.io/f/maqkkvgo" method="POST" id="beatForm">
    <label>Email</label>
    <input type="email" name="email" placeholder="you@example.com" required />

    <label>Beat Type (BPM, Key, Mood)</label>
    <input type="text" name="beat_type" placeholder="140 BPM • F Minor • Dark Trap" required />

    <label>Detailed Description</label>
    <textarea name="details" placeholder="Describe the vibe, instruments, references, energy, etc." required></textarea>

    <button type="submit">Send Request</button>
  </form>

  <!-- POPUP -->
  <div class="modal-bg" id="modal">
    <div class="modal-box">
      <h2>Request Sent</h2>
      <p>I will be in contact soon to let you know if the request has been done.</p>
      <button id="closeModal">Okay</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('beatForm');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        modal.style.display = 'flex';
        form.reset();
      } else {
        alert("Something went wrong. Try again.");
      }
    });

    closeModal.addEventListener('click', () => {
      modal.style.display = 'none';
    });
  </script>

</body>
</html>
